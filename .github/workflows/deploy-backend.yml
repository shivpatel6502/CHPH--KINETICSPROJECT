name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        # Set RENDER_DEPLOY_HOOK_URL in GitHub repo secrets
        # Get it from: Render dashboard → your service → Settings → Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -H "Content-Type: application/json" \
              --fail --silent --show-error
            echo "Render deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping backend deploy"
            echo "To enable: add RENDER_DEPLOY_HOOK_URL to GitHub repo secrets"
          fi
