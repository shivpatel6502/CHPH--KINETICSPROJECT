services:
  # ── Backend API (Node.js) ─────────────────────────────────
  - type: web
    name: wbb-dashboard-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    plan: free           # upgrade to starter ($7/mo) for persistent disk + no sleep
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Set these in the Render dashboard → Environment tab (never commit values):
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_CACHE_TTL
        value: "43200"
      - key: CORS_ORIGIN
        # We will allow all origins or the specific static site origin
        value: "*"

  # ── Frontend (Static Site) ────────────────────────────────
  - type: web
    name: wbb-dashboard-frontend
    runtime: static
    rootDir: frontend/public
    buildCommand: ""
    # No build command needed for plain HTML/JS
    plan: free

  # ── Optional: PostgreSQL database (free tier = 90 days, then $7/mo) ─────
  # Uncomment when ready to add a managed DB:
  # databases:
  #   - name: wbb-dashboard-db
  #     plan: free
  #     databaseName: wbb_dashboard
  #     user: wbb_admin
