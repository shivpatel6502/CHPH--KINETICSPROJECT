services:
  # ── Backend API (Node.js) ─────────────────────────────────
  - type: web
    name: wbb-dashboard-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    plan: free           # upgrade to starter ($7/mo) for persistent disk + no sleep
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: wbb-dashboard-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: wbb-dashboard-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wbb-dashboard-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: wbb-dashboard-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: wbb-dashboard-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wbb-dashboard-db
          property: password
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_CACHE_TTL
        value: "43200"
      - key: CORS_ORIGIN
        value: "*"


databases:
  # ── Managed PostgreSQL Database ───────────────────────────
  - name: wbb-dashboard-db
    plan: free
    databaseName: wbb_dashboard
    user: wbb_admin
